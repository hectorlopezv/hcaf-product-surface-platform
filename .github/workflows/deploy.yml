name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Railway deploy
        run: echo "Configure RAILWAY_TOKEN secret and railway up for production deploy"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vercel deploy
        run: echo "Configure VERCEL_TOKEN secret and vercel deploy for production deploy"
