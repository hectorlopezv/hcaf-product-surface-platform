name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm build

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::Skipping API deploy — add RAILWAY_TOKEN secret (see docs/DEPLOY.md)"
            exit 0
          fi
          npm install -g @railway/cli
          railway up --detach --service hcaf-api || railway up --detach

  deploy-operator-console:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Deploy Operator Console to Vercel
        working-directory: apps/operator-console
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_OPERATOR_CONSOLE_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Skipping operator-console deploy — set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_OPERATOR_CONSOLE_PROJECT_ID"
            exit 0
          fi
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes

  deploy-config-tool:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Deploy Config Tool to Vercel
        working-directory: apps/config-tool
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CONFIG_TOOL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Skipping config-tool deploy — set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_CONFIG_TOOL_PROJECT_ID"
            exit 0
          fi
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes

  deploy-analytics:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Deploy Analytics to Vercel
        working-directory: apps/analytics
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ANALYTICS_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Skipping analytics deploy — set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_ANALYTICS_PROJECT_ID"
            exit 0
          fi
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes
